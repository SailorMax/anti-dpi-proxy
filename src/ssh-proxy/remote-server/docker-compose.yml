services:
  ssh-server:
    build: ./
    volumes:
      - ./ssh-shared/entrypoint.sh:/entrypoint.sh:ro
      - ./ssh-shared/etc/ssh/sshd_config:/etc/ssh/sshd_config:ro
      - ./ssh-shared/etc:/root/external-etc:rw  # we can't mount pass-files directly
      - ./ssh-shared/home:/home:rw
    ports:
      - 0.0.0.0:443:443
    restart: on-failure:3
    entrypoint: 'sh /entrypoint.sh'
    command: '-e'  # logs to output (but file-logs is better for fail2ban scan)

  mtproto-proxy:
    image: telegrammessenger/proxy:latest
    volumes:
      - ./mtproto-shared:/data:rw
    environment:
      TAG: ${MTPROTO_TAG:-}
      SECRET: ${MTPROTO_SECRET:-}  # for mtg-version use 'dd'-prefix to turn on obfuscation mode
    ports:
      - 0.0.0.0:8443:443  # proxy port (:2398/stats only from localhost)
    restart: on-failure:3
    stop_signal: SIGKILL
    # to support :2398 stats port uncomment next lines:
    # entrypoint: [ "/bin/sh", "-c" ]
    # command: "sed -i '/^exec.*\\/mtproto-proxy/{/$$@/!s/$/ \"$$@\"/}' /run.sh; /run.sh --http-stats"

  # mtg-proxy:  # require setup for specifi server :(
  #   image: nineseconds/mtg:2
  #   ports:
  #     - 0.0.0.0:4430:443  # proxy port (:2398/stats only from localhost)
  #   restart: on-failure:3

  telemt-proxy:
    image: ghcr.io/telemt/telemt:latest
    volumes:
      - ./telemt-shared/config.toml:/app/config.toml:ro
    tmpfs:
      - /run/telemt:rw,mode=1777,size=1m
    environment:
      RUST_LOG: normal
    ports:
      - 0.0.0.0:4430:443
      - 127.0.0.1:9090:9090  # metrics (curl -s localhost:9090/metrics | grep '^telemt_user_unique_ips_')
    restart: on-failure:3
    stop_signal: SIGKILL
